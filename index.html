<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banner Preview – antoni</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
            color: #000;
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }

        .logo {
            font-size: 16px;
            font-weight: bold;
        }

        .meta {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .replay-all-btn,
        .replay-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }

        main {
            padding: 100px 40px 60px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section {
            margin-bottom: 80px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }

        .section-header-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .section-number {
            color: #999;
            font-size: 12px;
        }

        h2 {
            font-size: 22px;
            font-weight: 500;
        }

        .banner-grid {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .banner-item {
            display: flex;
            flex-direction: column;
        }

        .banner-label {
            margin-bottom: 10px;
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
        }

        iframe {
            border: 1px solid #ddd;
            background: #fff;
        }

        footer {
            border-top: 1px solid #ddd;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>

<body>

<header class="site-header">
    <div class="logo">antoni</div>

    <div style="display:flex; align-items:center; gap:24px;">
        <div class="meta">Banner Preview</div>

        <button class="replay-all-btn" onclick="replayAll()">
            Alle wiederholen
        </button>
    </div>
</header>

<main>

    <div class="section">

        <div class="section-header">

            <div class="section-header-left">
                <span class="section-number">01</span>
                <h2>KW22 · STANDARD</h2>
            </div>

            <button class="replay-btn" onclick="replaySection('section-01')">
                Wiederholen
            </button>

        </div>

        <div class="banner-grid" id="section-01">

            <div class="banner-item">

                <div class="banner-label">
                    STANDARD – 300 × 250
                </div>

                <iframe
                    src="260415_AS_GFA_Banner_300x250_KW22/260415_AS_GFA_Banner_300x250_KW22.html"
                    width="300"
                    height="250"
                    scrolling="no">
                </iframe>

            </div>

            <div class="banner-item">

                <div class="banner-label">
                    STANDARD – 200 × 600
                </div>

                <iframe
                    src="260512_AS_GFA_Banner_400x1200_KW22/260512_AS_GFA_Banner_400x1200_KW22.html"
                    width="200"
                    height="600"
                    scrolling="no">
                </iframe>

            </div>

        </div>

    </div>

    <div class="section">

        <div class="section-header">

            <div class="section-header-left">
                <span class="section-number">02</span>
                <h2>KW22 · QUALITÄT</h2>
            </div>

            <button class="replay-btn" onclick="replaySection('section-02')">
                Wiederholen
            </button>

        </div>

        <div class="banner-grid" id="section-02">

            <div class="banner-item">

                <div class="banner-label">
                    QUALITÄT – 300 × 250
                </div>

                <iframe
                    src="260415_AS_GFA_Qualitaet_Banner_300x250_KW22/260415_AS_GFA_Qualitaet_Banner_300x250_KW22.html"
                    width="300"
                    height="250"
                    scrolling="no">
                </iframe>

            </div>

            <div class="banner-item">

                <div class="banner-label">
                    QUALITÄT – 300 × 600
                </div>

                <iframe
                    src="260415_AS_GFA_Qualitaet_Banner_300x600_KW22/260415_AS_GFA_Qualitaet_Banner_300x600_KW22.html"
                    width="300"
                    height="600"
                    scrolling="no">
                </iframe>

            </div>

        </div>

    </div>

</main>

<footer>
    <div>© 2026 antoni GmbH</div>
    <div>Vertraulich – nur zur internen Verwendung</div>
</footer>

<script>
    function replaySection(sectionId) {
        const section = document.getElementById(sectionId);
        const iframes = section.querySelectorAll('iframe');

        iframes.forEach(function (iframe) {
            const src = iframe.src;
            iframe.src = '';
            iframe.src = src;
        });
    }

    function replayAll() {
        const iframes = document.querySelectorAll('iframe');

        iframes.forEach(function (iframe) {
            const src = iframe.src;
            iframe.src = '';
            iframe.src = src;
        });
    }
</script>

</body>
</html>
